<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #0f172a, #1d4d7a);
      color: #f8fbff;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      max-width: 640px;
      padding: 36px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }

    p {
      line-height: 1.7;
      color: #d7e7f8;
    }

    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #8ed1ff;
      color: #07294a;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Erreur 404</h1>
    <p>La ressource demandee n'existe pas sur le site statique S3 du projet CYB1153. Verifiez l'URL ou revenez a la page d'accueil.</p>
    <a href="index.html">Retour a l'accueil</a>
  </main>
</body>
</html>
